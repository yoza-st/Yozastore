<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOZA Food App</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#d6a97b;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.phone{
    width:390px;
    max-width:100%;
    background:#f8f2e8;
    border-radius:35px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
}

/* HERO */

.hero{
    background:#9d755f;
    padding:20px;
    color:white;
    position:relative;
}

.top-icons{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.top-icons i{
    font-size:18px;
}

.hero-content{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;
}

.hero-text h1{
    font-size:32px;
    margin-bottom:5px;
}

.hero-text p{
    opacity:.8;
    font-size:14px;
}

.hero img{
    width:160px;
    filter:drop-shadow(0 10px 15px rgba(0,0,0,.2));
}

/* CONTENT */

.content{
    padding:20px;
}

.section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.section-head h2{
    color:#3d2b1f;
    font-size:22px;
}

.badge{
    background:#ffb44c;
    color:white;
    padding:8px 14px;
    border-radius:30px;
    font-size:14px;
}

/* GRID */

.food-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.card{
    background:white;
    border-radius:20px;
    padding:12px;
    text-align:center;
    box-shadow:0 8px 15px rgba(0,0,0,.05);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.card img{
    width:90px;
    height:90px;
    object-fit:contain;
    margin-bottom:10px;
}

.card h4{
    font-size:14px;
    color:#3f2c1d;
    margin-bottom:6px;
}

.price{
    color:#ff9b2f;
    font-weight:700;
}

/* BOTTOM NAV */

.bottom-nav{
    margin-top:25px;
    background:#efe6d8;
    border-radius:25px;
    padding:15px;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav-btn{
    width:48px;
    height:48px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#6f5748;
}

.search-btn{
    width:120px;
    height:48px;
    border-radius:30px;
    background:#f3a63f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

@media(max-width:420px){

.hero img{
    width:130px;
}

.card img{
    width:70px;
    height:70px;
}

.food-grid{
    gap:10px;
}

}

</style>
</head>
<body>

<div class="phone">

    <div class="hero">

        <div class="top-icons">
            <i class="fas fa-bars"></i>
            <i class="fas fa-bell"></i>
        </div>

        <div class="hero-content">
            <div class="hero-text">
                <h1>YOZA</h1>
                <p>Best Burgers & Fries</p>
            </div>

            <img src="https://cdn-icons-png.flaticon.com/512/5787/5787016.png">
        </div>

    </div>

    <div class="content">

        <div class="section-head">
            <h2>Popular</h2>
            <div class="badge">7 Items</div>
        </div>

        <div class="food-grid">

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
                <h4>Burger</h4>
                <div class="price">$8.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
                <h4>Fries</h4>
                <div class="price">$3.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
                <h4>Wrap</h4>
                <div class="price">$7.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/5787/5787100.png">
                <h4>Pizza</h4>
                <div class="price">$10.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
                <h4>Cheese Burger</h4>
                <div class="price">$9.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/590/590685.png">
                <h4>Banana</h4>
                <div class="price">$2.99</div>
            </div>

        </div>

        <div class="bottom-nav">

            <div class="nav-btn">
                <i class="fas fa-house"></i>
            </div>

            <div class="search-btn">
                <i class="fas fa-search"></i>
                Search
            </div>

            <div class="nav-btn">
                <i class="fas fa-user"></i>
            </div>

        </div>

    </div>

</div>

</body>
</html>
