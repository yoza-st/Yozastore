<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOZA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f8f2e8;
    min-height:100vh;
}

/* HERO */

.hero{
    background:#9d755f;
    color:white;
    padding:25px;
    border-radius:0 0 35px 35px;
}

.top-icons{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.top-icons i{
    font-size:22px;
    cursor:pointer;
}

.hero-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
}

.hero-text h1{
    font-size:60px;
    font-weight:700;
    margin-bottom:8px;
}

.hero-text p{
    font-size:20px;
    opacity:.9;
}

.hero img{
    width:220px;
    max-width:45%;
}

/* CONTENT */

.content{
    max-width:1200px;
    margin:auto;
    padding:25px;
    padding-bottom:120px;
}

.section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.section-head h2{
    color:#3d2b1f;
    font-size:42px;
}

.badge{
    background:#f3a63f;
    color:white;
    padding:12px 25px;
    border-radius:50px;
    font-size:18px;
    font-weight:600;
}

/* FOOD GRID */

.food-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,.05);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:120px;
    height:120px;
    object-fit:contain;
}

.card h4{
    color:#3f2c1d;
    font-size:22px;
    margin-top:10px;
    margin-bottom:8px;
}

.price{
    color:#ff9b2f;
    font-size:22px;
    font-weight:700;
}

/* FIXED NAVIGATION */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:80px;

    background:#efe6d8;

    display:flex;
    justify-content:space-evenly;
    align-items:center;

    padding:0 20px;

    border-radius:25px 25px 0 0;
    box-shadow:0 -5px 20px rgba(0,0,0,.08);

    z-index:1000;
}

.nav-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#6f5748;
    font-size:22px;
    cursor:pointer;

    flex-shrink:0;
}

.search-btn{
    flex:1;
    max-width:250px;
    height:55px;

    background:#f3a63f;
    color:white;

    border-radius:50px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    font-size:22px;
    cursor:pointer;
}

/* TABLET */

@media(max-width:900px){

.hero-text h1{
    font-size:48px;
}

.hero img{
    width:180px;
}

.section-head h2{
    font-size:34px;
}

.card img{
    width:90px;
    height:90px;
}

.card h4{
    font-size:18px;
}

}

/* MOBILE */

@media(max-width:600px){

.hero{
    padding:20px;
}

.hero-content{
    gap:10px;
}

.hero-text h1{
    font-size:32px;
}

.hero-text p{
    font-size:15px;
}

.hero img{
    width:130px;
}

.section-head h2{
    font-size:22px;
}

.badge{
    padding:8px 16px;
    font-size:14px;
}

.food-grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.card{
    padding:10px;
    border-radius:18px;
}

.card img{
    width:65px;
    height:65px;
}

.card h4{
    font-size:13px;
}

.price{
    font-size:13px;
}

.bottom-nav{
    height:75px;
    padding:0 15px;
}

.nav-btn{
    width:50px;
    height:50px;
    font-size:18px;
}

.search-btn{
    max-width:none;
    width:55%;
    height:50px;
    font-size:18px;
}

}

</style>
</head>
<body>

<section class="hero">

    <div class="top-icons">
        <i class="fas fa-bars"></i>
        <i class="fas fa-bell"></i>
    </div>

    <div class="hero-content">

        <div class="hero-text">
            <h1>YOZA</h1>
            <p>Best Burgers & Fries</p>
        </div>

        <img src="https://photos.app.goo.gl/7bGGwkuHA663rezR9" alt="Burger">

    </div>

</section>

<section class="content">

    <div class="section-head">
        <h2>Popular</h2>
        <div class="badge">7 Items</div>
    </div>

    <div class="food-grid">

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h4>Burger</h4>
            <div class="price">$8.99</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
            <h4>Fries</h4>
            <div class="price">$3.99</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h4>Wrap</h4>
            <div class="price">$7.99</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/5787/5787100.png">
            <h4>Pizza</h4>
            <div class="price">$10.99</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h4>Cheese Burger</h4>
            <div class="price">$9.99</div>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/590/590685.png">
            <h4>Banana</h4>
            <div class="price">$2.99</div>
        </div>

    </div>

</section>

<div class="bottom-nav">

    <div class="nav-btn">
        <i class="fas fa-house"></i>
    </div>

    <div class="search-btn">
        <i class="fas fa-search"></i>
        Search
    </div>

    <div class="nav-btn">
        <i class="fas fa-user"></i>
    </div>

</div>

</body>
</html>
