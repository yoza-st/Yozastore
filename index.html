<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOZA</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="phone">

    <!-- HERO -->
    <div class="hero">
        <div class="top-bar">
            <h1>YOZA</h1>
            <i class="fas fa-bars"></i>
        </div>

        <div class="hero-content">
            <div class="hero-text">
                <h2>Delicious Food</h2>
                <p>Fresh, Fast & Tasty</p>
            </div>

            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600"
                 alt="Burger">
        </div>
    </div>

    <!-- CATEGORIES -->
    <div class="section">
        <div class="section-title">
            <h3>Popular Items</h3>
        </div>

        <div class="food-grid">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500">
                <h4>Burger</h4>
                <span>$8.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500">
                <h4>Pizza</h4>
                <span>$10.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1625944230945-1b7dd3b949ab?w=500">
                <h4>Fries</h4>
                <span>$4.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=500">
                <h4>Cheese Burger</h4>
                <span>$9.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500">
                <h4>Special Pizza</h4>
                <span>$12.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1574226516831-e1dff420e37f?w=500">
                <h4>Banana</h4>
                <span>$2.99</span>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="bottom-nav">
        <i class="fas fa-home active"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-heart"></i>
        <i class="fas fa-user"></i>
    </div>

</div>

</body>
</html>
