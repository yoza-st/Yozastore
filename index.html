<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOZA</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f7f2ea;
    min-height:100vh;
}

/* HERO */

.hero{
    width:100%;
    height:50vh;
    min-height:300px;
    background:#5e473f;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENT */

.content{
    max-width:1400px;
    margin:auto;
    padding:40px;
    padding-bottom:120px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

.logo{
    font-size:40px;
    font-weight:700;
    color:#2d2926;
}

.cart{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#ffad4d;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
}

/* PRODUCTS */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.card h4{
    margin-top:12px;
    font-size:22px;
    color:#333;
}

.price{
    margin-top:10px;
    font-size:24px;
    font-weight:700;
    color:#ffad4d;
}

/* BOTTOM NAV */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    padding:15px 25px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    box-shadow:0 -5px 20px rgba(0,0,0,.1);
    z-index:1000;
}

.nav-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#f2ede6;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#444;
    cursor:pointer;
}

.search-box{
    flex:1;
    max-width:600px;
    height:60px;
    background:#ffad4d;
    border-radius:40px;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 20px;
}

.search-box i{
    color:white;
}

.search-box input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:18px;
}

.search-box input::placeholder{
    color:rgba(255,255,255,.85);
}

/* MOBILE */

@media(max-width:768px){

    .hero{
        height:300px;
    }

    .content{
        padding:20px;
        padding-bottom:120px;
    }

    .logo{
        font-size:30px;
    }

    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:500px){

    .grid{
        grid-template-columns:1fr;
    }

    .bottom-nav{
        gap:10px;
        padding:10px;
    }

    .nav-btn{
        width:55px;
        height:55px;
    }

    .search-box{
        height:55px;
    }
}

</style>
</head>
<body>

<!-- HERO IMAGE -->

<div class="hero">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1600"
    alt="Burger">
</div>

<!-- CONTENT -->

<div class="content">

    <div class="header">

        <div class="logo">
            YOZA
        </div>

        <div class="cart">
            <i class="fa-solid fa-bag-shopping"></i>
        </div>

    </div>

    <div class="grid">

        <div class="card" data-name="burger">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h4>Burger</h4>
            <div class="price">$8.99</div>
        </div>

        <div class="card" data-name="fries">
            <img src="https://cdn-icons-png.flaticon.com/512/5787/5787016.png">
            <h4>Fries</h4>
            <div class="price">$4.99</div>
        </div>

        <div class="card" data-name="wrap">
            <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png">
            <h4>Wrap</h4>
            <div class="price">$7.49</div>
        </div>

        <div class="card" data-name="pizza">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
            <h4>Pizza</h4>
            <div class="price">$12.99</div>
        </div>

        <div class="card" data-name="chicken">
            <img src="https://cdn-icons-png.flaticon.com/512/2515/2515183.png">
            <h4>Chicken</h4>
            <div class="price">$9.99</div>
        </div>

        <div class="card" data-name="drink">
            <img src="https://cdn-icons-png.flaticon.com/512/3480/3480823.png">
            <h4>Drink</h4>
            <div class="price">$2.99</div>
        </div>

    </div>

</div>

<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">

    <div class="nav-btn">
        <i class="fa-solid fa-house"></i>
    </div>

    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            id="searchInput"
            placeholder="Search food..."
            onkeyup="searchFood()">
    </div>

    <div class="nav-btn">
        <i class="fa-solid fa-user"></i>
    </div>

</div>

<script>

function searchFood(){

    let input =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    let cards =
    document.querySelectorAll(".card");

    cards.forEach(card => {

        let food =
        card.dataset.name.toLowerCase();

        if(food.includes(input)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }

    });

}

</script>

</body>
</html>
