<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOZA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f8f2e8;
    min-height:100vh;
}

/* HERO */

.hero{
    background:#9d755f;
    color:white;
    padding:25px;
    border-radius:0 0 35px 35px;
}

.top-icons{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.top-icons i{
    font-size:22px;
    cursor:pointer;
}

.hero-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.hero-text h1{
    font-size:60px;
    font-weight:700;
}

.hero-text p{
    font-size:20px;
    opacity:.9;
}

.hero img{
    width:220px;
    max-width:45%;
}

/* CONTENT */

.content{
    max-width:1200px;
    margin:auto;
    padding:25px;
    padding-bottom:120px;
}

.section-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.section-head h2{
    color:#3d2b1f;
    font-size:42px;
}

.badge{
    background:#f3a63f;
    color:white;
    padding:12px 25px;
    border-radius:50px;
    font-size:18px;
}

/* GRID */

.food-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.card img{
    width:120px;
    height:120px;
    object-fit:contain;
}

.card h4{
    margin-top:10px;
    color:#3f2c1d;
}

.price{
    color:#ff9b2f;
    font-weight:700;
    margin-top:5px;
}

/* FIXED NAV */

.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    height:80px;

    background:#efe6d8;

    display:flex;
    align-items:center;
    justify-content:space-evenly;

    padding:0 15px;

    border-radius:25px 25px 0 0;
    box-shadow:0 -5px 20px rgba(0,0,0,.08);

    z-index:1000;
}

.nav-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    color:#6f5748;
    cursor:pointer;
}

/* SEARCH */

.search-container{
    flex:1;
    display:flex;
    gap:8px;
    max-width:320px;
    margin:0 10px;
}

#searchInput{
    flex:1;
    border:none;
    outline:none;
    height:55px;
    border-radius:50px;
    padding:0 18px;
    font-size:16px;
}

.search-btn{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#f3a63f;
    color:white;
    cursor:pointer;
    font-size:18px;
}

/* MOBILE */

@media(max-width:600px){

.hero{
    padding:20px;
}

.hero-text h1{
    font-size:32px;
}

.hero-text p{
    font-size:14px;
}

.hero img{
    width:120px;
}

.section-head h2{
    font-size:22px;
}

.badge{
    font-size:13px;
    padding:8px 14px;
}

.food-grid{
    gap:10px;
}

.card{
    padding:10px;
}

.card img{
    width:65px;
    height:65px;
}

.card h4{
    font-size:12px;
}

.price{
    font-size:12px;
}

.bottom-nav{
    height:75px;
}

#searchInput{
    height:50px;
    font-size:14px;
}

.search-btn{
    width:50px;
    height:50px;
}

.nav-btn{
    width:50px;
    height:50px;
}

}

</style>
</head>
<body>

<section class="hero">

    <div class="top-icons">
        <i class="fas fa-bars"></i>
        <i class="fas fa-bell"></i>
    </div>

    <div class="hero-content">

        <div class="hero-text">
            <h1>YOZA</h1>
            <p>Best Burgers & Fries</p>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="Burger">

    </div>

</section>

<section class="content">

    <div class="section-head">
        <h2>Popular</h2>
        <div class="badge">9 Items</div>
    </div>

    <div class="food-grid">

        <div class="card" data-name="Burger">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h4>Burger</h4>
            <div class="price">$8.99</div>
        </div>

        <div class="card" data-name="Wrap">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h4>Wrap</h4>
            <div class="price">$7.99</div>
        </div>

        <div class="card" data-name="Fries">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
            <h4>Fries</h4>
            <div class="price">$3.99</div>
        </div>

        <div class="card" data-name="Pizza">
            <img src="https://cdn-icons-png.flaticon.com/512/5787/5787100.png">
            <h4>Pizza</h4>
            <div class="price">$10.99</div>
        </div>

        <div class="card" data-name="Cheese Burger">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
            <h4>Cheese Burger</h4>
            <div class="price">$9.99</div>
        </div>

        <div class="card" data-name="Banana">
            <img src="https://cdn-icons-png.flaticon.com/512/590/590685.png">
            <h4>Banana</h4>
            <div class="price">$2.99</div>
        </div>

        <div class="card" data-name="Hotdog">
            <img src="https://cdn-icons-png.flaticon.com/512/5787/5787069.png">
            <h4>Hotdog</h4>
            <div class="price">$5.99</div>
        </div>

        <div class="card" data-name="Donut">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046786.png">
            <h4>Donut</h4>
            <div class="price">$4.99</div>
        </div>

        <div class="card" data-name="Taco">
            <img src="https://cdn-icons-png.flaticon.com/512/5787/5787076.png">
            <h4>Taco</h4>
            <div class="price">$6.99</div>
        </div>

    </div>

</section>

<div class="bottom-nav">

    <div class="nav-btn">
        <i class="fas fa-house"></i>
    </div>

    <div class="search-container">

        <input
            type="text"
            id="searchInput"
            placeholder="Search food..."
        >

        <button
            class="search-btn"
            onclick="searchFood()">
            <i class="fas fa-search"></i>
        </button>

    </div>

    <div class="nav-btn">
        <i class="fas fa-user"></i>
    </div>

</div>

<script>

function searchFood(){

    const searchText =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    const cards =
    document.querySelectorAll(".card");

    cards.forEach(card => {

        const foodName =
        card.dataset.name.toLowerCase();

        if(foodName.includes(searchText)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }

    });

}

document
.getElementById("searchInput")
.addEventListener("keyup", function(event){

    if(event.key === "Enter"){
        searchFood();
    }

});

</script>

</body>
</html>
