<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOZA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#ddb07a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.phone{
    width:100%;
    max-width:420px;
    background:#f7f1e7;
    border-radius:40px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

/* HERO */

.hero{
    background:#7f6256;
    padding:20px;
    color:white;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.top-bar h1{
    font-size:24px;
    letter-spacing:2px;
}

.hero-content{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
}

.hero-text h2{
    font-size:28px;
    line-height:1.1;
}

.hero-text p{
    opacity:.8;
    margin-top:10px;
}

.hero img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:20px;
}

/* SECTION */

.section{
    padding:20px;
}

.section-title{
    margin-bottom:15px;
}

.section-title h3{
    color:#333;
}

.food-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    background:white;
    border-radius:18px;
    padding:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:12px;
}

.card h4{
    margin-top:10px;
    font-size:14px;
    color:#333;
}

.card span{
    color:#f59e0b;
    font-weight:600;
}

/* BOTTOM NAV */

.bottom-nav{
    background:white;
    display:flex;
    justify-content:space-around;
    padding:18px;
    border-top:1px solid #eee;
}

.bottom-nav i{
    font-size:20px;
    color:#999;
    cursor:pointer;
}

.bottom-nav .active{
    color:#f59e0b;
}

/* TABLET */

@media (min-width:768px){

    .phone{
        max-width:900px;
    }

    .food-grid{
        grid-template-columns:repeat(3,1fr);
    }

    .hero img{
        width:220px;
        height:220px;
    }

    .hero-text h2{
        font-size:42px;
    }
}

/* LARGE DESKTOP */

@media (min-width:1200px){

    .phone{
        max-width:1200px;
    }

    .food-grid{
        grid-template-columns:repeat(4,1fr);
    }
}
</style>

</head>
<body>

<div class="phone">

    <!-- HERO -->
    <div class="hero">
        <div class="top-bar">
            <h1>YOZA</h1>
            <i class="fas fa-bars"></i>
        </div>

        <div class="hero-content">
            <div class="hero-text">
                <h2>Delicious Food</h2>
                <p>Fresh, Fast & Tasty</p>
            </div>

            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600"
                 alt="Burger">
        </div>
    </div>

    <!-- POPULAR ITEMS -->
    <div class="section">
        <div class="section-title">
            <h3>Popular Items</h3>
        </div>

        <div class="food-grid">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Burger">
                <h4>Burger</h4>
                <span>$8.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" alt="Pizza">
                <h4>Pizza</h4>
                <span>$10.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1625944230945-1b7dd3b949ab?w=500" alt="Fries">
                <h4>Fries</h4>
                <span>$4.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=500" alt="Cheese Burger">
                <h4>Cheese Burger</h4>
                <span>$9.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500" alt="Special Pizza">
                <h4>Special Pizza</h4>
                <span>$12.99</span>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1574226516831-e1dff420e37f?w=500" alt="Banana">
                <h4>Banana</h4>
                <span>$2.99</span>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="bottom-nav">
        <i class="fas fa-home active"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-heart"></i>
        <i class="fas fa-user"></i>
    </div>

</div>

</body>
</html>
