<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOZA Food App</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ddb07a;
    padding:20px;
}

.phone{
    width:360px;
    background:#f7f2ea;
    border-radius:40px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
}

/* TOP */

.hero{
    height:270px;
    background:linear-gradient(180deg,#7f6257,#5e473f);
    position:relative;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding-bottom:20px;
}

.hero img{
    width:90%;
    object-fit:contain;
}

/* CONTENT */

.content{
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#3a302c;
}

.cart{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#ff9e47;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:white;
    border-radius:18px;
    padding:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card img{
    width:100%;
    height:80px;
    object-fit:contain;
}

.card h4{
    font-size:13px;
    margin-top:8px;
    color:#333;
}

.price{
    color:#ff9e47;
    font-weight:600;
    margin-top:5px;
}

/* BOTTOM NAV */

.bottom-nav{
    background:white;
    padding:15px 20px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav-btn{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#f3efe8;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    color:#444;
}

.search-btn{
    width:140px;
    height:55px;
    border:none;
    border-radius:30px;
    background:#ffad4d;
    color:white;
    font-size:18px;
    font-weight:600;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

@media(max-width:420px){

.phone{
    width:100%;
    max-width:360px;
}

}

</style>
</head>
<body>

<div class="phone">

    <div class="hero">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" alt="">
    </div>

    <div class="content">

        <div class="header">
            <div class="logo">YOZA</div>

            <div class="cart">
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
        </div>

        <!-- ONLY 3 ITEMS -->

        <div class="grid">

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
                <h4>Burger</h4>
                <div class="price">$8.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/5787/5787016.png">
                <h4>Fries</h4>
                <div class="price">$4.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png">
                <h4>Wrap</h4>
                <div class="price">$7.49</div>
            </div>

        </div>

    </div>

    <!-- CUSTOM NAV -->

    <div class="bottom-nav">

        <div class="nav-btn">
            <i class="fa-solid fa-house"></i>
        </div>

        <button class="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
            Search
        </button>

        <div class="nav-btn">
            <i class="fa-solid fa-user"></i>
        </div>

    </div>

</div>

</body>
</html>
