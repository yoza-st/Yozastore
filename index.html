<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOZA</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#ddb07a;
    min-height:100vh;
}

/* MAIN CONTAINER */

.phone{
    width:100%;
    min-height:100vh;
    background:#f7f2ea;
    display:flex;
    flex-direction:column;
}

/* HERO SECTION */

.hero{
    height:45vh;
    min-height:350px;
    background:linear-gradient(180deg,#7f6257,#5e473f);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.hero img{
    width:90%;
    max-width:700px;
    object-fit:contain;
}

/* CONTENT */

.content{
    flex:1;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

.logo{
    font-size:38px;
    font-weight:700;
    color:#3a302c;
    letter-spacing:2px;
}

.cart{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#ff9e47;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
}

/* PRODUCT GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.card h4{
    font-size:20px;
    margin-top:10px;
    color:#333;
}

.price{
    margin-top:8px;
    color:#ff9e47;
    font-size:20px;
    font-weight:700;
}

/* BOTTOM NAV */

.bottom-nav{
    background:white;
    padding:20px 40px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    box-shadow:0 -5px 20px rgba(0,0,0,.08);
}

.nav-btn{
    width:65px;
    height:65px;
    border-radius:50%;
    background:#f3efe8;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    color:#444;
    cursor:pointer;
}

.search-btn{
    width:250px;
    height:65px;
    border:none;
    border-radius:40px;
    background:#ffad4d;
    color:white;
    font-size:20px;
    font-weight:600;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.hero{
    height:35vh;
}

.content{
    padding:20px;
}

.logo{
    font-size:28px;
}

.grid{
    grid-template-columns:repeat(2,1fr);
}

.card img{
    height:120px;
}

.search-btn{
    width:170px;
}

}

@media(max-width:480px){

.grid{
    grid-template-columns:1fr;
}

.bottom-nav{
    padding:15px;
    gap:15px;
}

.search-btn{
    flex:1;
    width:auto;
}

}

</style>
</head>
<body>

<div class="phone">

    <div class="hero">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1200" alt="Burger">
    </div>

    <div class="content">

        <div class="header">
            <div class="logo">YOZA</div>

            <div class="cart">
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
        </div>

        <div class="grid">

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
                <h4>Burger</h4>
                <div class="price">$8.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/5787/5787016.png">
                <h4>Fries</h4>
                <div class="price">$4.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png">
                <h4>Wrap</h4>
                <div class="price">$7.49</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
                <h4>Pizza</h4>
                <div class="price">$12.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/2515/2515183.png">
                <h4>Chicken</h4>
                <div class="price">$9.99</div>
            </div>

            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/3480/3480823.png">
                <h4>Drink</h4>
                <div class="price">$2.99</div>
            </div>

        </div>

    </div>

    <div class="bottom-nav">

        <div class="nav-btn">
            <i class="fa-solid fa-house"></i>
        </div>

        <button class="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
            Search Food
        </button>

        <div class="nav-btn">
            <i class="fa-solid fa-user"></i>
        </div>

    </div>

</div>

</body>
</html>
